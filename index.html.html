<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coşkun'a Özel Bilgi Yarışması</title>
    <style>
        :root {
            --navy: #000033;
            --gold: #FFD700;
            --black: #000000;
            --red: #ff3333;
            --green: #2ecc71;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--navy);
            color: var(--gold);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        #game-container {
            width: 100%;
            max-width: 800px;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Başlangıç Ekranı */
        #start-screen {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5);
        }

        .btn-gold {
            background-color: var(--gold);
            color: var(--black);
            padding: 20px 60px;
            font-size: 2rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
        }

        /* Yarışma Ekranı */
        #quiz-screen { display: none; }

        #timer-bar {
            width: 100%;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #timer-progress {
            width: 100%;
            height: 100%;
            background-color: var(--gold);
            transition: width 1s linear, background-color 0.3s ease;
        }

        #question-text {
            font-size: 1.6rem;
            color: var(--gold);
            margin-bottom: 30px;
            line-height: 1.4;
            font-weight: 500;
            text-align: left;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-box {
            background-color: var(--gold);
            color: var(--black);
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            border: 2px solid transparent;
            word-wrap: break-word; /* Uzun metinler için */
        }

        .option-prefix {
            margin-right: 15px;
            font-size: 1.3rem;
            opacity: 0.8;
        }

        .option-text {
            flex: 1;
        }

        .correct {
            background-color: var(--green) !important;
            color: var(--white);
            border-color: var(--green);
        }

        .wrong {
            background-color: var(--red) !important;
            color: var(--white);
            border-color: var(--red);
        }

        #insult-message {
            color: var(--red);
            font-weight: bold;
            font-size: 1.1rem;
            height: 30px;
            margin-bottom: 20px;
            text-align: center;
            font-style: italic;
        }

        /* Jokerler ve Navigasyon */
        .control-panel {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            padding-top: 20px;
        }

        .joker-btn, .nav-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .joker-btn:hover:not(:disabled), .nav-btn:hover {
            background-color: rgba(255, 215, 0, 0.1);
        }

        .joker-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Canlı Puan */
        #live-score {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 51, 0.8);
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 100;
        }

        /* Sonuç Ekranı */
        #result-screen {
            display: none;
            text-align: center;
        }

        .unvan-text {
            font-size: 1.8rem;
            margin: 20px 0;
            color: var(--white);
            font-weight: bold;
        }

        .stats-text {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.8);
        }

        #leaderboard {
            text-align: left;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 215, 0, 0.3);
            padding-top: 20px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        #leaderboard h3 { margin-bottom: 15px; text-align: center; }

        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        .coskun-row {
            color: var(--red);
            font-weight: bold;
            background-color: rgba(255, 0, 0, 0.1);
        }

        /* Pulse Efekti */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0px rgba(255, 51, 51, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 51, 51, 0); }
            100% { box-shadow: 0 0 0 0px rgba(255, 51, 51, 0); }
        }

        .pulse {
            animation: pulse-red 0.5s infinite;
        }

        /* Kutlama (Confetti) efekti için basit stil */
        #confetti {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 99; display: none;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            #game-container { padding: 15px; }
            #question-text { font-size: 1.2rem; }
            .option-box { font-size: 1rem; padding: 15px; }
            .control-panel { flex-direction: column; gap: 5px; }
            .joker-btn, .nav-btn { width: 100%; }
            #live-score { top: auto; bottom: 10px; right: 10px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="confetti"></div>
    <div id="live-score">Puan: <span id="current-score">0</span></div>

    <div id="game-container">
        <div id="start-screen">
            <h1>Coşkun'a Özel<br>Bilgi Yarışması</h1>
            <button class="btn-gold" id="start-btn">START</button>
        </div>

        <div id="quiz-screen">
            <div id="timer-bar"><div id="timer-progress"></div></div>
            <div id="question-text"></div>
            <div class="options-container" id="options-container"></div>
            <div id="insult-message"></div>

            <div class="control-panel">
                <div style="display: flex; gap: 10px;">
                    <button class="joker-btn" id="joker-time" onclick="useJokerTime()">Süreyi Uzat (-2 Puan)</button>
                    <button class="joker-btn" id="joker-ask" onclick="useJokerAsk()">Bana Sor</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="nav-btn" onclick="navigateQuestion(-1)">← Geri</button>
                    <button class="nav-btn" onclick="navigateQuestion(1)">İleri →</button>
                </div>
            </div>
        </div>

        <div id="result-screen">
            <h1>Oyun Bitti!</h1>
            <div class="unvan-text" id="final-unvan"></div>
            <div class="stats-text" id="final-stats"></div>

            <div id="leaderboard">
                <h3>Liderlik Tablosu</h3>
                <div class="leaderboard-row"><span>1. Berk (Deha)</span><span>985 Puan</span></div>
                <div class="leaderboard-row"><span>2. Osman (Halt-ı Büyük)</span><span>720 Puan</span></div>
                <div class="leaderboard-row"><span>3. Tuana</span><span>640 Puan</span></div>
                <div class="leaderboard-row coskun-row"><span>99. Coşkun</span><span id="final-score-board">0</span> Puan</div>
            </div>

            <button class="btn-gold" style="margin-top: 30px; font-size: 1.5rem;" onclick="location.reload()">Yeniden Oyna</button>
        </div>
    </div>

    <audio id="snd-bg" loop src="https://cdn.pixabay.com/audio/2024/05/22/audio_123abc456.mp3"></audio> <audio id="snd-correct" src="https://cdn.pixabay.com/audio/2022/03/15/audio_2d66085a69.mp3"></audio>
    <audio id="snd-wrong" src="https://cdn.pixabay.com/audio/2021/08/04/audio_c58f01c23a.mp3"></audio>
    <audio id="snd-heartbeat" loop src="https://cdn.pixabay.com/audio/2023/09/18/audio_123456789.mp3"></audio>

    <script>
        // --- VERİLER VE SORULAR ---
        const rawQuestions = [
            {q: "Berkaya taktığın lakap nedir?( Çocuk senden bıktı)", a: ["Fenerli embesil", "Dayak torbası", "Sarı bok", "Amk veledi"], c: 2},
            {q: "Osman'ın en güldüğümüz lafı neydi?", a: ["Halt-ı Büyük", "Salak-i Embesil", "Kahvehane-i Süleyman", "Veled-i Zina"], c: 3},
            {q: "Kahveden öğrendiğin ve hep söylediğin o gıcık kelime nedir?", a: ["Oynama ağla", "Oyna ağlama", "Ağla oynama", "Ağlama oyna"], c: 3},
            {q: "Abinle nasıl dalga geçersin?", a: ["Siktiğimin evde kalmışı", "Babamın pişmanlığı", "Genel evin müdürü", "Amk keli"], c: 3},
            {q: "Tuana'yı en çok sinir eden kız hangisi?", a: ["Yağmur", "Hanife", "Ayşenur-amkodumun150'si", "Helin"], c: 2},
            {q: "Coşkun'un en sevdiği seri? ( hadi seç amk)", a: ["Breaking Bad", "Harry Potter", "Teenage Wolf", "Ezel"], c: 1},
            {q: "Tuana'nın en sevdiği karakter?", a: ["My melody", "Hello Kity", "Cinnamon Roll", "Kuromi"], c: 3},
            {q: "Enişte'nin nesi meşhur?", a: ["Göbeği", "Benzinliği", "O gelmeyince kimsenin benzinliğe gelmemesi", "Benzinlikteki sobayı cehennem sıcağına getirmesi"], c: 3},
            {q: "Sevgilin bir sabah uyandığında \"Sence ben bir solucan olsaydım beni yine sever miydin?\" dediğinde doğru cevap ne olmalıdır?", a: ["Evet (Yalan olduğu çok belli)", "Hayır (Dürüst ama kavga sebebi)", "\"Toprağına göre değişir\"", "Odadan koşarak uzaklaşmak"], c: 2},
            {q: "\"Neyin var?\" sorusuna alınan \"Yok bir şey\" cevabı gerçekte ne anlama gelir?", a: ["Gerçekten bir şeyi yoktur.", "Şu an her şeyi yakıp yıkabilirim, hazır ol.", "Söyleyeceklerimi listeliyorum, 5 dakika bekle.", "Naz yapmam lazım, nazımı çek."], c: 3},
            {q: "Eski sevgilinin fotoğrafını \"yanlışlıkla\" beğendin. Bu durumda ne yapılmalıdır?", a: ["Hemen geri al (Geçmiş olsun bildirim gitti)", "Hesabı tamamen kapatıp ülkeden kaçmak.", "Beğenmişken diğer fotoğrafları da beğenip \"siklememek\".", "Telefonun bozulduğunu iddia edip tamire vermek."], c: 2},
            {q: "\"İlk buluşmada hesabı kim ödemeli?\" sorusunun \"Bay Coşkun\" için doğru cevabı hangisidir?", a: ["Tabii ki ben.", "Alman usulü (Modern ama riskli)", "Elbette ben demek aynı zamanda ego kasıp ödediği için illa bunun sefasını sürmek.", "Lavaboya gidip dönmemek."], c: 2},
            {q: "Sevgilinle izlediğin film çok sıkıcı ama o çok beğeniyor. Tavrın ne olur?", a: ["\"Bu ne biçim film\" diyerek eleştirmek.", "Uyuyakalmak (En güvenli liman)", "Oscar almışçasına analiz kasmak.", "Hiç siklemeden \"bok gibi film bu ne amk\" diyip başka film açmak"], c: 3},
            {q: "Birlikte çekilen bir fotoğrafta sevgilin kötü, sen ise \"mükemmel\" çıkmışsın. O fotoğraf paylaşılır mı?", a: ["Asla, ilişki huzuru her şeydir.", "Sevgilinin yüzüne emoji koyup paylaşmak.", "\"Benim için önemli olan ruh güzelliği\" deyip paylaşmak.", "Sevgilini kırpıp sadece kendini paylaşmak."], c: 3},
            {q: "\"Aşkın ömrü ne kadardır?\" sorusuna Coşkun'un vereceği en \"bilimsel\" cevap nedir?", a: ["İlk tartışmaya kadar.", "Evdeki internet kesilene kadar.", "\"Nörobiyolojik olarak 3 yıl\" (Yine bilmişlik yaptı)", "Ben istemeye devam edene kadar."], c: 3},
            {q: "Sevgilin saçını kestirmiş ama sen fark etmedin. Kurtuluş cümlen hangisidir?", a: ["\"Yüzüne bir aydınlık gelmiş, anlam verememiştim.\"", "\"Fark ettim de, iyice otursun diye bekledim.\"", "\"Saçın mı vardı?\" (Ölüm fermanı)", "Sıvamadan özür dilemek."], c: 3},
            {q: "\"Eski sevgilinle arkadaş kalabilir misin?\" sorusuna hangi cevabı vermelisin?", a: ["Tabii ki, medeniyet bunu gerektirir.", "Omegleden yeni kız bulursam siklemem.", "\"Sadece hikayelerine bakıyorum\" arkadaşlığı.", "Kız güzelse değişir."], c: 3},
            {q: "Sevgilin çok kötü bir yemek yapmış ama büyük bir heyecanla sana yediriyor. Ne dersin?", a: ["\"Ellerine sağlık ama bu ne?\"", "\"Ömrümde yediğim en değişik lezzet.\" (Diplomatik cevap)", "Sen bir daha yemek yapma.", "Ağlayarak yemeye devam etmek."], c: 2},
            {q: "Sevgilin telefonunun şifresini sordu. İlk tepkin ne olur?", a: ["\"Al canım, zaten şifre senin doğum günün.\"", "\"Güven olmayan yerde aşk olmaz\" deyip savunmaya geçmek.", "Yanlış şifre verip \"Telefon bozulmuş\" demek.", "Telefonu pencereden aşağı atmak."], c: 3},
            {q: "Tartışma sırasında \"Sen bilirsin\" cümlesi duyulursa ne yapılmalıdır?", a: ["Bildiğini yapmak.", "Asla bildiğini yapmamak (Tuzak var)", "\"Hayır, sen ne dersen o\" diyerek pası geri atmak.", "Asla senin bilmenin doğru bir seçenek olmacağını anlaman."], c: 3},
            {q: "Coşkun'un en çok lafını ettiği şey nedir?", a: ["Bıktım çalışmaktan", "Ramazanın burnu", "Tuana'nın 2 dk'lık inlemeli ses kaydı atması", "Bu telefon niye açılmıyo"], c: 2},
            {q: "Coşkun'un Tuana'yla ilgili en çok dalga geçtiği şey nedir?", a: ["Belgeyi çevirememesi", "Sosislerin sevişmesini izlemesi", "Karekök sorularını yapamaması", "Coğrafya bilgisinin 0 olması"], c: 1},
            {q: "Öbür hayatında en çok gay olmaya müsait arkadaşın hangisi?", a: ["Osman", "Süleyman", "Emin", "Münir"], c: 3},
            {q: "D-C oynadın, cesareti seçtin. Aşağıdakilerden birini öpmen gerek. Muhtemelen kimi öperdin?", a: ["Münir", "Osman", "Enişten", "Süleyman"], c: 1},
            {q: "Tuana'nın yeğenin adı nedir?", a: ["Arda Aslan", "Arden Aslan", "Akif Aslan", "Alperen Aslan"], c: 1},
            {q: "Bir adamın 5 kızı var ve her kızının bir erkek kardeşi var. Bu adamın toplam kaç çocuğu vardır?", a: ["6", "10", "11", "5"], c: 0},
            {q: "Dün, yarın olsaydı bugün Cumartesi olurdu. Bugün günlerden nedir?", a: ["Pazartesi", "Pazar", "Cuma", "Perşembe"], c: 3},
            {q: "Bir adam bir portreye bakıyor ve diyor ki: \"Kardeşim ya da kız kardeşim yok, ama bu adamın babası, babamın oğludur.\" Portredeki adam kimdir?", a: ["Kendisi", "Babası", "Oğlu", "Yeğeni"], c: 2},
            {q: "\"O\" benim annemdir ama ben onun oğlu değilim. Ben kimim?", a: ["Babası", "Kızı", "Torunu", "Komşusu"], c: 1},
            {q: "Cebindeki son parayla ne alırsın?", a: ["Tabii ki okey masasında yancılara çay.", "\"Zekamı nasıl artırırım?\" adlı kişisel gelişim kitabı.", "En yakın büfeden çift lavaş dürüm.", "Piyango bileti (Son umut)."], c: 3}
        ];

        const insults = [
            "Bu soruda elenmen şaşırttı mı?",
            "Profesör Pompous bugün formunda değil galiba?",
            "IQ testi sonucun 'dosya bulunamadı' veriyor.",
            "Coşkun, cidden mi? Bunu ilkokulda öğretiyorlar.",
            "Acı çekmeni izlemek hoşuma gidiyor."
        ];

        // --- OYUN DEĞİŞKENLERİ ---
        let questions = [];
        let currentIdx = 0;
        let score = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let timeLeft = 30;
        let timerInterval;
        let isAnswered = false;
        let jokersUsed = { time: false, ask: false };
        let playerAnswers = []; // Geri-ileri yaparken cevapları tutmak için

        // --- SES KONTROLÜ ---
        const sounds = {
            bg: document.getElementById('snd-bg'),
            correct: document.getElementById('snd-correct'),
            wrong: document.getElementById('snd-wrong'),
            heart: document.getElementById('snd-heartbeat')
        };

        // --- BAŞLATMA ---
        document.getElementById('start-btn').addEventListener('click', () => {
            // Sesleri tarayıcıya tanıt
            Object.values(sounds).forEach(s => { s.play(); s.pause(); s.currentTime = 0; });
            
            sounds.bg.play().catch(() => console.log("Ses politikası engeli"));
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            
            // Soruları kopyala ve karıştır
            questions = [...rawQuestions].sort(() => Math.random() - 0.5);
            playerAnswers = new Array(questions.length).fill(null);
            
            loadQuestion();
        });

        // --- SORU YÜKLEME ---
        function loadQuestion() {
            isAnswered = false;
            timeLeft = 30;
            document.getElementById('insult-message').innerText = "";
            document.getElementById('game-container').classList.remove('pulse');
            sounds.heart.pause();
            sounds.heart.currentTime = 0;

            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = `${currentIdx + 1}. ${q.q}`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            const prefixes = ['A', 'B', 'C', 'D'];
            q.a.forEach((optText, index) => {
                const div = document.createElement('div');
                div.className = 'option-box';
                div.innerHTML = `<span class="option-prefix">${prefixes[index]} -</span><span class="option-text">${optText}</span>`;
                
                // Eğer zaten cevaplanmışsa renkleri göster
                if (playerAnswers[currentIdx] !== null) {
                    isAnswered = true;
                    if (index === q.c) div.classList.add('correct');
                    if (index === playerAnswers[currentIdx] && index !== q.c) div.classList.add('wrong');
                } else {
                    div.onclick = () => checkAnswer(index, div);
                }
                
                container.appendChild(div);
            });

            // Joker butonlarını güncelle
            document.getElementById('joker-time').disabled = jokersUsed.time || isAnswered;
            document.getElementById('joker-ask').disabled = jokersUsed.ask || isAnswered;

            if (!isAnswered) {
                startTimer();
            } else {
                clearInterval(timerInterval);
                document.getElementById('timer-progress').style.width = '0%';
            }
        }

        // --- CEVAP KONTROLÜ ---
        function checkAnswer(selectedIndex, selectedDiv) {
            if (isAnswered) return;
            isAnswered = true;
            clearInterval(timerInterval);
            sounds.heart.pause();
            playerAnswers[currentIdx] = selectedIndex;

            const q = questions[currentIdx];
            const correctIndex = q.c;

            if (selectedIndex === correctIndex) {
                selectedDiv.classList.add('correct');
                sounds.correct.play();
                score += 10;
                correctCount++;
            } else {
                selectedDiv.classList.add('wrong');
                sounds.wrong.play();
                score -= 5;
                wrongCount++;
                document.getElementById('insult-message').innerText = insults[Math.floor(Math.random() * insults.length)];
                
                // Doğru şıkkı da göster
                const options = document.querySelectorAll('.option-box');
                options[correctIndex].classList.add('correct');
            }

            document.getElementById('current-score').innerText = score;

            // Sonraki soruya otomatik geç (1.5 sn sonra)
            setTimeout(() => {
                if (currentIdx < questions.length - 1) {
                    navigateQuestion(1);
                } else {
                    endGame();
                }
            }, 1500);
        }

        // --- TIMER ---
        function startTimer() {
            clearInterval(timerInterval);
            const progressBar = document.getElementById('timer-progress');
            progressBar.style.width = '100%';
            progressBar.style.backgroundColor = 'var(--gold)';

            timerInterval = setInterval(() => {
                timeLeft--;
                let perc = (timeLeft / 30) * 100;
                progressBar.style.width = perc + '%';

                if (timeLeft <= 10) {
                    progressBar.style.backgroundColor = 'var(--red)';
                }

                if (timeLeft === 5) {
                    sounds.heart.play();
                    document.getElementById('game-container').classList.add('pulse');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    // Süre bittiğinde yanlış kabul et
                    if (!isAnswered) {
                        sounds.wrong.play();
                        score -= 5;
                        wrongCount++;
                        playerAnswers[currentIdx] = -1; // -1: süre bitti
                        document.getElementById('current-score').innerText = score;
                        document.getElementById('insult-message').innerText = "Süre bitti amk, uyuma!";
                        
                        // Doğru şıkkı göster
                        const options = document.querySelectorAll('.option-box');
                        options[questions[currentIdx].c].classList.add('correct');

                        setTimeout(() => {
                            if (currentIdx < questions.length - 1) navigateQuestion(1);
                            else endGame();
                        }, 1500);
                    }
                }
            }, 1000);
        }

        // --- NAVİGASYON (Geri/İleri) ---
        function navigateQuestion(step) {
            let target = currentIdx + step;
            if (target >= 0 && target < questions.length) {
                currentIdx = target;
                loadQuestion();
            }
        }

        // --- JOKERLER ---
        function useJokerTime() {
            if (jokersUsed.time || isAnswered) return;
            jokersUsed.time = true;
            score -= 2;
            document.getElementById('current-score').innerText = score;
            timeLeft += 15; // 15 saniye ekle
            if (timeLeft > 30) timeLeft = 30; // Max 30 olsun
            document.getElementById('joker-time').disabled = true;
            
            // Eğer kalp atışı başlamışsa durdur
            if (timeLeft > 5) {
                sounds.heart.pause();
                document.getElementById('game-container').classList.remove('pulse');
            }
        }

        function useJokerAsk() {
            if (jokersUsed.ask || isAnswered) return;
            jokersUsed.ask = true;
            document.getElementById('joker-ask').disabled = true;
            
            const q = questions[currentIdx];
            const prefixes = ['A', 'B', 'C', 'D'];
            
            // Dürüst ama gıcık bir joker: Doğru cevabı %50 ihtimalle verir, %50 ihtimalle yalan söyler.
            let jokerLie = Math.random() > 0.5;
            let tipIndex;
            
            if (jokerLie) {
                // Yanlış bir şık seç
                let wrongOptions = [0,1,2,3].filter(i => i !== q.c);
                tipIndex = wrongOptions[Math.floor(Math.random() * wrongOptions.length)];
            } else {
                tipIndex = q.c;
            }

            alert(`Sözde Yapay Zeka Cevabı:\n\nBence cevap kesinlikle ${prefixes[tipIndex]} şıkkı Coşkun. Ama bana pek güvenme, ben sadece bir kod parçasıyım, sen ise bir malsın.`);
        }

        // --- BİTİŞ ---
        function endGame() {
            clearInterval(timerInterval);
            sounds.bg.pause();
            sounds.heart.pause();
            
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('live-score').style.display = 'none';
            document.getElementById('final-score-board').innerText = score;

            // Unvan belirleme
            let unvan = "";
            if (score <= 30) unvan = "0-30 Puan: En azından okuma yazman var (Zorlandın ama)";
            else if (score <= 70) unvan = "31-70 Puan: Bir profesör (Pompous) için utanç verici";
            else unvan = "71+ Puan: Şans eseri bildin, sevinme.";
            
            document.getElementById('final-unvan').innerText = unvan;
            document.getElementById('final-stats').innerText = `Puanın: ${score} | Doğru: ${correctCount} | Yanlış: ${wrongCount} | Boş/Süre Biten: ${questions.length - (correctCount+wrongCount)}`;

            // Kutlama efekti (Confetti)
            startConfetti();
        }

        // --- BASİT KONFETİ EFEKTİ ---
        function startConfetti() {
            const container = document.getElementById('confetti');
            container.style.display = 'block';
            for (let i = 0; i < 50; i++) {
                const confetto = document.createElement('div');
                confetto.style.position = 'absolute';
                confetto.style.width = '10px';
                confetto.style.height = '10px';
                confetto.style.backgroundColor = Math.random() > 0.5 ? 'var(--gold)' : 'var(--white)';
                confetto.style.top = Math.random() * 100 + '%';
                confetto.style.left = Math.random() * 100 + '%';
                confetto.style.opacity = Math.random();
                confetto.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(confetto);
            }
            setTimeout(() => container.style.display = 'none', 4000);
        }
    </script>
</body>
</html>
